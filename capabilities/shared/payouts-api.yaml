naftiko: "1.0.0-alpha1"

info:
  label: "Runa Payouts API"
  description: >-
    Shared capability definition for the Runa Payouts API v2. Provides
    digital reward order creation, order management, product catalog browsing,
    account balance retrieval, and connectivity testing operations.
  tags:
    - Gift Cards
    - Rewards
    - Payments
    - Incentives
    - Payouts
    - Runa
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RUNA_API_KEY: RUNA_API_KEY

capability:
  consumes:
    - type: http
      namespace: payouts-api
      baseUri: https://api.runa.io/v2
      description: "Runa Payouts API for digital reward and gift card distribution"
      authentication:
        type: apikey
        key: X-Api-Key
        value: "{{RUNA_API_KEY}}"
        placement: header
      resources:
        - name: orders
          path: /order
          description: Digital reward order management
          operations:
            - name: create-order
              method: POST
              description: "Create a new digital reward or gift card order"
              inputParameters:
                - name: payment_method
                  in: body
                  type: object
                  required: true
                  description: "Payment method (type, currency)"
                - name: items
                  in: body
                  type: array
                  required: true
                  description: "Order items with face_value, distribution_method, and products"
                - name: X-Idempotency-Key
                  in: header
                  type: string
                  required: false
                  description: "Idempotency key (UUID) to prevent duplicate orders"
                - name: X-Execution-Mode
                  in: header
                  type: string
                  required: false
                  description: "sync or async execution mode"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-orders
              method: GET
              description: "List orders for the authenticated account"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-order
              method: GET
              description: "Get details for a specific order by ID"
              inputParameters:
                - name: orderId
                  in: path
                  type: string
                  required: true
                  description: "Order identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: estimate-order
              method: POST
              description: "Estimate the cost of an order before creating it"
              inputParameters:
                - name: payment_method
                  in: body
                  type: object
                  required: true
                  description: "Payment method for estimation"
                - name: items
                  in: body
                  type: array
                  required: true
                  description: "Items to estimate"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: products
          path: /products
          description: Product catalog browsing
          operations:
            - name: list-products
              method: GET
              description: "Browse available gift card and payout products"
              inputParameters:
                - name: country
                  in: query
                  type: string
                  required: false
                  description: "ISO country code filter"
                - name: category
                  in: query
                  type: string
                  required: false
                  description: "Category name filter"
                - name: currency
                  in: query
                  type: string
                  required: false
                  description: "Currency code filter"
                - name: query
                  in: query
                  type: string
                  required: false
                  description: "Search by product name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-product
              method: GET
              description: "Get details for a specific product"
              inputParameters:
                - name: productId
                  in: path
                  type: string
                  required: true
                  description: "Product identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-categories
              method: GET
              description: "List all product categories in the Runa catalog"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-countries
              method: GET
              description: "List all supported countries"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: balance
          path: /balance
          description: Account balance management
          operations:
            - name: get-balance
              method: GET
              description: "Get account balance by currency"
              inputParameters:
                - name: currency
                  in: query
                  type: string
                  required: false
                  description: "ISO 4217 currency code"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: utilities
          path: /ping
          description: Connectivity and health check
          operations:
            - name: ping
              method: GET
              description: "Verify API connectivity and authentication"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: payouts-api-rest
      resources:
        - path: /v1/orders
          name: orders
          description: "Digital reward orders"
          operations:
            - method: POST
              name: create-order
              description: "Create a new reward order"
              call: "payouts-api.create-order"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-orders
              description: "List orders"
              call: "payouts-api.list-orders"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/orders/{orderId}
          name: order
          description: "Specific order"
          operations:
            - method: GET
              name: get-order
              description: "Get order details"
              call: "payouts-api.get-order"
              with:
                orderId: "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/products
          name: products
          description: "Product catalog"
          operations:
            - method: GET
              name: list-products
              description: "Browse products"
              call: "payouts-api.list-products"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/balance
          name: balance
          description: "Account balance"
          operations:
            - method: GET
              name: get-balance
              description: "Get balance"
              call: "payouts-api.get-balance"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: payouts-api-mcp
      transport: http
      tools:
        - name: create-order
          description: "Create a new digital reward or gift card order via Runa"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "payouts-api.create-order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-order
          description: "Get details and status for a specific Runa order"
          hints:
            readOnly: true
            openWorld: false
          call: "payouts-api.get-order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-orders
          description: "List all orders for the Runa account"
          hints:
            readOnly: true
            openWorld: false
          call: "payouts-api.list-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: estimate-order
          description: "Estimate the cost of a Runa order before placing it"
          hints:
            readOnly: true
            openWorld: false
          call: "payouts-api.estimate-order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-products
          description: "Browse available gift card and payout products in the Runa catalog"
          hints:
            readOnly: true
            openWorld: true
          call: "payouts-api.list-products"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-product
          description: "Get detailed information about a specific Runa product"
          hints:
            readOnly: true
            openWorld: false
          call: "payouts-api.get-product"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-categories
          description: "List all product categories available in the Runa catalog"
          hints:
            readOnly: true
            openWorld: false
          call: "payouts-api.list-categories"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-countries
          description: "List all countries supported by the Runa platform"
          hints:
            readOnly: true
            openWorld: false
          call: "payouts-api.list-countries"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-account-balance
          description: "Get the current Runa account balance by currency"
          hints:
            readOnly: true
            openWorld: false
          call: "payouts-api.get-balance"
          outputParameters:
            - type: object
              mapping: "$."
