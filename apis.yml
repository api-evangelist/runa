specificationVersion: '0.19'
apis:
  - aid: runa:runa-payouts-api
    name: Runa Payouts API
    description: >-
      The Runa Payouts API (v2) enables digital reward and gift card
      distribution at scale. Core operations include creating orders
      (synchronous and asynchronous), retrieving order details, listing
      orders, estimating order costs, managing account balances, browsing
      the product catalog by category and country, and receiving order
      completion and product update webhooks. Authentication uses the
      X-Api-Key header. Idempotency is supported via X-Idempotency-Key.
    humanURL: https://developer.runa.io/
    baseURL: https://api.runa.io/v2
