aid: runa
name: Runa
description: >-
  Runa is a global digital payouts platform that enables businesses to
  automate digital reward and gift card distribution through a single API.
  The platform provides access to over 5,000 gift cards and payout options
  across 190+ countries, supporting B2C payments, employee rewards, customer
  incentives, and loyalty programs. The Runa API supports synchronous and
  asynchronous order modes, balance management, product catalog browsing,
  and webhook-based event notifications for order completions.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
